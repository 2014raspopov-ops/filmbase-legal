<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>VK Auth</title></head>
<body>
<h2>VK Authorization</h2>
<div id="result"></div>
<script>
var params = {};
var hash = window.location.hash.substring(1);
var query = window.location.search.substring(1);
(hash || query).split("&").forEach(function(p) {
  var kv = p.split("=");
  params[kv[0]] = decodeURIComponent(kv[1] || "");
});
var el = document.getElementById("result");
if (params.access_token) {
  el.innerHTML = "<p>Токен получен! Скопируй его:</p><textarea rows=4 cols=80>" + params.access_token + "</textarea>";
} else if (params.code) {
  el.innerHTML = "<p>Код авторизации:</p><textarea rows=2 cols=80>" + params.code + "</textarea>";
} else {
  el.innerHTML = "<p>Ошибка: " + JSON.stringify(params) + "</p>";
}
</script>
</body>
</html>
